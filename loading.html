<!DOCTYPE html>
<html lang="ru" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Загрузка</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        body,
        html,
        #app {
            height: 100vh;
            overflow: hidden;
            background: var(--bg-main);
        }

        .loading-page-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 0 24px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Custom Animated SVG Icon */
        .sync-icon-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sync-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(77, 139, 245, 0.4) 0%, transparent 70%);
            z-index: 1;
            animation: pulse-glow-sync 2.5s infinite alternate;
        }

        @keyframes pulse-glow-sync {
            from {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.6;
            }

            to {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 1;
            }
        }

        /* Sleek Dash Circle Loader */
        .dotted-loader {
            position: relative;
            width: 80px;
            height: 80px;
            z-index: 2;
        }

        .dash {
            position: absolute;
            width: 6px;
            height: 16px;
            background: #2152CD;
            border-radius: 6px;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            opacity: 0;
            box-shadow: 0 0 10px rgba(77, 139, 245, 0.4);
            animation: dashFade 1.2s infinite ease-in-out;
        }

        /* Generated via JS but styled here for exact math if needed manually. We will use 12 dots. */
        .dash:nth-child(1) {
            transform: translate(-50%, -50%) rotate(0deg) translateY(-32px);
            animation-delay: 0.0s;
        }

        .dash:nth-child(2) {
            transform: translate(-50%, -50%) rotate(30deg) translateY(-32px);
            animation-delay: 0.1s;
        }

        .dash:nth-child(3) {
            transform: translate(-50%, -50%) rotate(60deg) translateY(-32px);
            animation-delay: 0.2s;
        }

        .dash:nth-child(4) {
            transform: translate(-50%, -50%) rotate(90deg) translateY(-32px);
            animation-delay: 0.3s;
        }

        .dash:nth-child(5) {
            transform: translate(-50%, -50%) rotate(120deg) translateY(-32px);
            animation-delay: 0.4s;
        }

        .dash:nth-child(6) {
            transform: translate(-50%, -50%) rotate(150deg) translateY(-32px);
            animation-delay: 0.5s;
        }

        .dash:nth-child(7) {
            transform: translate(-50%, -50%) rotate(180deg) translateY(-32px);
            animation-delay: 0.6s;
        }

        .dash:nth-child(8) {
            transform: translate(-50%, -50%) rotate(210deg) translateY(-32px);
            animation-delay: 0.7s;
        }

        .dash:nth-child(9) {
            transform: translate(-50%, -50%) rotate(240deg) translateY(-32px);
            animation-delay: 0.8s;
        }

        .dash:nth-child(10) {
            transform: translate(-50%, -50%) rotate(270deg) translateY(-32px);
            animation-delay: 0.9s;
        }

        .dash:nth-child(11) {
            transform: translate(-50%, -50%) rotate(300deg) translateY(-32px);
            animation-delay: 1.0s;
        }

        .dash:nth-child(12) {
            transform: translate(-50%, -50%) rotate(330deg) translateY(-32px);
            animation-delay: 1.1s;
        }

        @keyframes dashFade {

            0%,
            100% {
                opacity: 0.15;
                background: #2152CD;
                transform: translate(-50%, -50%) rotate(var(--rot)) translateY(-32px) scale(0.9);
            }

            50% {
                opacity: 1;
                background: #4F8EF7;
                transform: translate(-50%, -50%) rotate(var(--rot)) translateY(-32px) scale(1.1);
                box-shadow: 0 0 12px rgba(77, 139, 245, 0.8);
            }
        }
    </style>
</head>

<body>
    <!-- Animated background layers -->
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <div id="app">
        <main class="view active">
            <div class="loading-page-container">
                <div class="sync-icon-wrapper">
                    <div class="sync-glow"></div>
                    <div class="dotted-loader">
                        <div class="dash" style="--rot: 0deg;"></div>
                        <div class="dash" style="--rot: 30deg;"></div>
                        <div class="dash" style="--rot: 60deg;"></div>
                        <div class="dash" style="--rot: 90deg;"></div>
                        <div class="dash" style="--rot: 120deg;"></div>
                        <div class="dash" style="--rot: 150deg;"></div>
                        <div class="dash" style="--rot: 180deg;"></div>
                        <div class="dash" style="--rot: 210deg;"></div>
                        <div class="dash" style="--rot: 240deg;"></div>
                        <div class="dash" style="--rot: 270deg;"></div>
                        <div class="dash" style="--rot: 300deg;"></div>
                        <div class="dash" style="--rot: 330deg;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Init Telegram Mini App
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            const savedTheme = localStorage.getItem('theme') || 'light';
            try {
                if (tg.isVersionAtLeast && tg.isVersionAtLeast('6.1')) {
                    if (savedTheme === 'dark') {
                        tg.setHeaderColor('#0a0e17');
                        tg.setBackgroundColor('#0a0e17');
                    } else {
                        tg.setHeaderColor('#fafafa');
                        tg.setBackgroundColor('#fafafa');
                    }
                }
            } catch (e) { }
        }

        // Auto-redirect for preview purposes if opened directly
        // In real use, this page is shown while waiting for data.
        setTimeout(() => {
            // Uncomment to test redirect locally
            // window.location.href = "index.html"; 
        }, 3000);
    </script>
</body>

</html>
